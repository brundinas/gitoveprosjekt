<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Klassen vår</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Klassen vår</h1>
    <p class="intro">
      Målet er at alle i klassen skal legge til navnet sitt og gi det en egen farge.
    </p>

    <section class="card">
      <h2>Navneliste</h2>
      <ul class="student-list">
        <!-- Elevene legger til navnet sitt her -->
        <!-- Eksempel:
        <li class="hilde">Hilde</li>
        -->
      </ul>
    </section>

    <section class="card">
      <h2>Oppgave</h2>
      <ol>
        <li>Legg til navnet ditt i lista i <code>index.html</code>.</li>
        <li>Lag en egen CSS-klasse i <code>style.css</code>.</li>
        <li>Gi navnet ditt en egen farge.</li>
      </ol>
    </section>
  </main>
</body>
</html>
